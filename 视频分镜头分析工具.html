<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频分镜头分析与画面提取工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#8B5CF6',
                        dark: '#1F2937',
                        light: '#F9FAFB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass {
                background: rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .progress-ring-circle {
                transition: stroke-dashoffset 0.35s;
                transform: rotate(-90deg);
                transform-origin: 50% 50%;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-dark to-gray-800 text-light min-h-screen">
    <header class="sticky top-0 z-50 glass border-b border-white/10">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-accent">
                <i class="fa fa-film mr-2"></i>视频分镜头分析工具
            </h1>
            <nav>
                <ul class="flex space-x-6">
                    <li><a href="#" class="hover:text-primary transition-colors duration-300 flex items-center">
                        <i class="fa fa-question-circle mr-1"></i> 帮助
                    </a></li>
                    <li><a href="#" class="hover:text-primary transition-colors duration-300 flex items-center">
                        <i class="fa fa-github mr-1"></i> 源码
                    </a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- 上传区域 -->
        <section class="mb-12">
            <div id="upload-container" class="border-2 border-dashed border-primary/50 rounded-xl p-8 text-center hover:border-primary transition-colors duration-300">
                <input type="file" id="video-upload" accept="video/*" class="hidden">
                <label for="video-upload" class="cursor-pointer">
                    <div class="flex flex-col items-center">
                        <i class="fa fa-cloud-upload text-5xl text-primary/70 mb-4"></i>
                        <h2 class="text-xl font-semibold mb-2">拖放视频文件到此处或点击上传</h2>
                        <p class="text-gray-400 mb-4">支持 MP4, WebM, MOV 等格式</p>
                        <button id="custom-upload-button" class="bg-primary hover:bg-primary/90 text-white px-6 py-3 rounded-lg transition-all duration-300 transform hover:scale-105 flex items-center">
                            <i class="fa fa-plus-circle mr-2"></i>选择视频文件
                        </button>
                    </div>
                </label>
            </div>
        </section>

        <!-- 视频预览区域 -->
        <section id="video-preview" class="mb-12 hidden">
            <div class="bg-dark/50 rounded-xl p-6 shadow-2xl">
                <div class="flex flex-col md:flex-row gap-6">
                    <div class="md:w-2/3">
                        <div class="relative aspect-video bg-black rounded-lg overflow-hidden">
                            <video id="video-player" class="w-full h-full object-contain" controls></video>
                            <div id="analysis-overlay" class="absolute inset-0 bg-dark/80 flex flex-col items-center justify-center hidden">
                                <svg class="w-16 h-16 text-primary animate-spin" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                <p class="mt-4 text-lg">正在分析视频...</p>
                            </div>
                        </div>
                        <div class="mt-4 flex flex-wrap gap-3">
                            <button id="start-analysis" class="bg-secondary hover:bg-secondary/90 text-white px-4 py-2 rounded-lg transition-all duration-300 flex items-center">
                                <i class="fa fa-play-circle mr-2"></i>开始分析
                            </button>
                            <button id="extract-frames" class="bg-accent hover:bg-accent/90 text-white px-4 py-2 rounded-lg transition-all duration-300 flex items-center disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                <i class="fa fa-image mr-2"></i>提取关键帧
                            </button>
                            <button id="download-shots" class="bg-accent hover:bg-accent/90 text-white px-4 py-2 rounded-lg transition-all duration-300 flex items-center disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                <i class="fa fa-film mr-2"></i>下载分镜头预览
                            </button>
                            <button id="reset-analysis" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-all duration-300 flex items-center">
                                <i class="fa fa-refresh mr-2"></i>重新开始
                            </button>
                        </div>
                    </div>
                    <div class="md:w-1/3">
                        <div class="bg-dark/30 rounded-lg p-4 h-full">
                            <h3 class="text-xl font-semibold mb-4 flex items-center">
                                <i class="fa fa-bar-chart text-primary mr-2"></i>分析结果
                            </h3>
                            <div class="space-y-4">
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span class="text-gray-300">检测到的分镜头数</span>
                                        <span id="shot-count" class="font-bold text-primary">0</span>
                                    </div>
                                    <div class="w-full bg-gray-700 rounded-full h-2.5">
                                        <div id="shot-progress" class="bg-primary h-2.5 rounded-full" style="width: 0%"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span class="text-gray-300">平均镜头时长</span>
                                        <span id="avg-shot-duration" class="font-bold text-primary">-</span>
                                    </div>
                                    <div class="w-full bg-gray-700 rounded-full h-2.5">
                                        <div id="duration-progress" class="bg-secondary h-2.5 rounded-full" style="width: 0%"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span class="text-gray-300">场景变化检测阈值</span>
                                        <div class="flex items-center">
                                            <span id="threshold-value" class="font-bold text-accent mr-2">30</span>
                                            <i class="fa fa-sliders text-accent"></i>
                                        </div>
                                    </div>
                                    <input type="range" id="scene-threshold" min="5" max="100" value="30" 
                                        class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-accent">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 分镜头预览区域 -->
        <section id="shots-preview" class="mb-12 hidden">
            <div class="bg-dark/50 rounded-xl p-6 shadow-2xl">
                <h3 class="text-xl font-semibold mb-4 flex items-center">
                    <i class="fa fa-film text-primary mr-2"></i>分镜头预览
                </h3>
                <div id="shots-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    <!-- 分镜头缩略图将在这里动态生成 -->
                    <div class="text-center text-gray-400 col-span-full py-8">
                        <i class="fa fa-film text-4xl mb-3"></i>
                        <p>分析完成后，分镜头缩略图将显示在这里</p>
                    </div>
                </div>
                <div class="mt-6 text-center">
                    <button id="download-all-shots" class="bg-primary hover:bg-primary/90 text-white px-6 py-3 rounded-lg transition-all duration-300 transform hover:scale-105 flex items-center mx-auto disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fa fa-download mr-2"></i>打包下载所有分镜头
                    </button>
                </div>
            </div>
        </section>

        <!-- 关键帧提取区域 -->
        <section id="frames-extracted" class="mb-12 hidden">
            <div class="bg-dark/50 rounded-xl p-6 shadow-2xl">
                <h3 class="text-xl font-semibold mb-4 flex items-center">
                    <i class="fa fa-images text-accent mr-2"></i>提取的关键帧
                </h3>
                <div class="flex flex-wrap gap-4" id="extracted-frames-container">
                    <!-- 提取的关键帧将在这里动态生成 -->
                    <div class="text-center text-gray-400 w-full py-8">
                        <i class="fa fa-image text-4xl mb-3"></i>
                        <p>点击"提取关键帧"按钮后，关键帧图像将显示在这里</p>
                    </div>
                </div>
                <div class="mt-6 text-center">
                    <button id="download-all" class="bg-primary hover:bg-primary/90 text-white px-6 py-3 rounded-lg transition-all duration-300 transform hover:scale-105 flex items-center mx-auto disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fa fa-download mr-2"></i>下载所有关键帧
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer class="glass border-t border-white/10 py-6">
        <div class="container mx-auto px-4 text-center text-gray-400">
            <p>© 2025 视频分镜头分析工具 | 使用 HTML, JavaScript 和 Tailwind CSS 构建</p>
            <div class="mt-3 flex justify-center space-x-4">
                <a href="#" class="hover:text-primary transition-colors duration-300"><i class="fa fa-github"></i></a>
                <a href="#" class="hover:text-primary transition-colors duration-300"><i class="fa fa-twitter"></i></a>
                <a href="#" class="hover:text-primary transition-colors duration-300"><i class="fa fa-linkedin"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // 全局变量
        let videoElement = document.getElementById('video-player');
        let uploadContainer = document.getElementById('upload-container');
        let videoPreview = document.getElementById('video-preview');
        let shotsPreview = document.getElementById('shots-preview');
        let framesExtracted = document.getElementById('frames-extracted');
        let videoFile = null;
        let canvas = document.createElement('canvas');
        let ctx = canvas.getContext('2d');
        let shots = [];
        let keyFrames = [];

        // 自定义上传按钮点击事件
        document.getElementById('custom-upload-button').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('video-upload').click();
        });

        // 上传视频文件
        document.getElementById('video-upload').addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                videoFile = this.files[0];
                loadVideo(videoFile);
            }
        });

        // 拖放上传
        uploadContainer.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('border-primary');
            this.classList.add('bg-primary/10');
        });

        uploadContainer.addEventListener('dragleave', function() {
            this.classList.remove('border-primary');
            this.classList.remove('bg-primary/10');
        });

        uploadContainer.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('border-primary');
            this.classList.remove('bg-primary/10');

            if (e.dataTransfer.files.length) {
                videoFile = e.dataTransfer.files[0];
                loadVideo(videoFile);
            }
        });

        // 加载视频
        function loadVideo(file) {
            const videoURL = URL.createObjectURL(file);
            videoElement.src = videoURL;
            videoElement.onloadedmetadata = function() {
                videoPreview.classList.remove('hidden');
                document.getElementById('shot-count').textContent = '0';
                document.getElementById('avg-shot-duration').textContent = '-';
                document.getElementById('shot-progress').style.width = '0%';
                document.getElementById('duration-progress').style.width = '0%';
                shotsPreview.classList.add('hidden');
                framesExtracted.classList.add('hidden');
                shots = [];
                keyFrames = [];
            };
        }

        // 开始分析视频
        document.getElementById('start-analysis').addEventListener('click', function() {
            if (!videoElement.src) return;
            
            document.getElementById('analysis-overlay').classList.remove('hidden');
            document.getElementById('extract-frames').disabled = true;
            document.getElementById('download-shots').disabled = true;
            document.getElementById('download-all-shots').disabled = true;
            
            // 重置结果
            shots = [];
            document.getElementById('shots-grid').innerHTML = `
                <div class="text-center text-gray-400 col-span-full py-8">
                    <i class="fa fa-spinner fa-spin text-4xl mb-3"></i>
                    <p>正在分析视频，请稍候...</p>
                </div>
            `;
            
            setTimeout(() => {
                analyzeVideo();
            }, 1000);
        });

        // 分析视频
        function analyzeVideo() {
            const videoDuration = videoElement.duration;
            const sceneThreshold = parseInt(document.getElementById('scene-threshold').value);
            const frameCaptureInterval = 0.5; // 每秒捕获2帧
            const totalFrames = Math.ceil(videoDuration / frameCaptureInterval);
            let processedFrames = 0;
            let prevFrameData = null;
            let currentShotStart = 0;
            
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            
            // 视频帧分析函数
            function processFrame(time) {
                videoElement.currentTime = time;
                
                videoElement.onseeked = function() {
                    // 捕获当前帧
                    ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                    const frameData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    // 计算与前一帧的差异
                    let frameDiff = 0;
                    if (prevFrameData) {
                        for (let i = 0; i < frameData.length; i += 4) {
                            const rDiff = Math.abs(frameData[i] - prevFrameData[i]);
                            const gDiff = Math.abs(frameData[i+1] - prevFrameData[i+1]);
                            const bDiff = Math.abs(frameData[i+2] - prevFrameData[i+2]);
                            frameDiff += (rDiff + gDiff + bDiff) / 3;
                        }
                        
                        // 归一化差异值
                        const normalizedDiff = frameDiff / (canvas.width * canvas.height);
                        
                        // 如果差异超过阈值，认为是场景切换
                        if (normalizedDiff > sceneThreshold) {
                            shots.push({
                                start: currentShotStart,
                                end: time,
                                duration: time - currentShotStart,
                                thumbnail: canvas.toDataURL('image/jpeg', 0.7)
                            });
                            currentShotStart = time;
                        }
                    }
                    
                    prevFrameData = frameData.slice();
                    processedFrames++;
                    
                    // 更新进度
                    const progress = Math.floor((processedFrames / totalFrames) * 100);
                    document.getElementById('shot-progress').style.width = `${progress}%`;
                    
                    // 处理下一帧
                    const nextTime = time + frameCaptureInterval;
                    if (nextTime < videoDuration) {
                        setTimeout(() => processFrame(nextTime), 10);
                    } else {
                        // 处理最后一个镜头
                        shots.push({
                            start: currentShotStart,
                            end: videoDuration,
                            duration: videoDuration - currentShotStart,
                            thumbnail: canvas.toDataURL('image/jpeg', 0.7)
                        });
                        
                        // 分析完成，更新UI
                        finishAnalysis();
                    }
                };
            }
            
            // 开始处理第一帧
            processFrame(0);
        }

        // 完成分析
        function finishAnalysis() {
            document.getElementById('analysis-overlay').classList.add('hidden');
            document.getElementById('extract-frames').disabled = false;
            document.getElementById('download-shots').disabled = false;
            document.getElementById('download-all-shots').disabled = false;
            
            // 更新分析结果
            document.getElementById('shot-count').textContent = shots.length;
            
            // 计算平均镜头时长
            const totalDuration = shots.reduce((sum, shot) => sum + shot.duration, 0);
            const avgDuration = totalDuration / shots.length;
            document.getElementById('avg-shot-duration').textContent = avgDuration.toFixed(2) + '秒';
            
            // 更新进度条
            document.getElementById('shot-progress').style.width = '100%';
            const durationProgress = Math.min((avgDuration / 5) * 100, 100); // 假设5秒为"理想"平均时长
            document.getElementById('duration-progress').style.width = `${durationProgress}%`;
            
            // 显示分镜头预览
            displayShots();
            shotsPreview.classList.remove('hidden');
        }

        // 显示分镜头预览
        function displayShots() {
            const shotsGrid = document.getElementById('shots-grid');
            shotsGrid.innerHTML = '';
            
            shots.forEach((shot, index) => {
                const shotElement = document.createElement('div');
                shotElement.className = 'bg-dark/30 rounded-lg overflow-hidden hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1';
                shotElement.innerHTML = `
                    <div class="relative aspect-video">
                        <img src="${shot.thumbnail}" alt="分镜头 ${index + 1}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 left-0 right-0 bg-dark/70 text-white p-2 text-sm">
                            ${formatTime(shot.start)} - ${formatTime(shot.end)}
                        </div>
                        <button class="absolute top-2 right-2 bg-primary/80 hover:bg-primary text-white p-1 rounded-full transition-colors duration-300" 
                                data-time="${shot.start}" onclick="seekToTime(${shot.start})">
                            <i class="fa fa-play"></i>
                        </button>
                        <button class="absolute top-2 left-2 bg-accent/80 hover:bg-accent text-white p-1 rounded-full transition-colors duration-300" 
                                onclick="downloadShot('${shot.thumbnail}', '分镜头_${index + 1}.jpg', ${index})">
                            <i class="fa fa-download"></i>
                        </button>
                    </div>
                    <div class="p-2 text-center">
                        <span class="text-sm font-medium">镜头 ${index + 1}</span>
                        <span class="text-xs text-gray-400 ml-1">${shot.duration.toFixed(1)}s</span>
                    </div>
                `;
                shotsGrid.appendChild(shotElement);
            });
        }

        // 跳转到指定时间
        window.seekToTime = function(time) {
            videoElement.currentTime = time;
            videoElement.play();
        };

        // 下载单个分镜头
        window.downloadShot = function(dataUrl, fileName, index) {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // 提取关键帧
        document.getElementById('extract-frames').addEventListener('click', function() {
            if (shots.length === 0) return;
            
            keyFrames = [];
            framesExtracted.classList.remove('hidden');
            document.getElementById('extracted-frames-container').innerHTML = `
                <div class="text-center text-gray-400 w-full py-8">
                    <i class="fa fa-spinner fa-spin text-4xl mb-3"></i>
                    <p>正在提取关键帧，请稍候...</p>
                </div>
            `;
            
            // 使用Promise.all确保所有帧都被正确提取
            const framePromises = shots.map((shot, index) => {
                return new Promise((resolve) => {
                    // 为每个镜头提取中间帧作为关键帧
                    const keyTime = shot.start + (shot.duration / 2);
                    
                    videoElement.currentTime = keyTime;
                    videoElement.onseeked = function() {
                        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                        const keyFrameData = canvas.toDataURL('image/jpeg', 0.8);
                        
                        keyFrames.push({
                            shotIndex: index,
                            time: keyTime,
                            data: keyFrameData
                        });
                        
                        resolve();
                    };
                });
            });
            
            // 当所有帧都处理完毕后更新UI
            Promise.all(framePromises).then(() => {
                updateFramesUI();
            });
        });

        // 更新关键帧UI
        function updateFramesUI() {
            const framesContainer = document.getElementById('extracted-frames-container');
            framesContainer.innerHTML = '';
            
            keyFrames.forEach((frame, index) => {
                const frameElement = document.createElement('div');
                frameElement.className = 'relative bg-dark/30 rounded-lg overflow-hidden hover:shadow-lg transition-all duration-300';
                frameElement.innerHTML = `
                    <div class="relative aspect-video">
                        <img src="${frame.data}" alt="关键帧 ${index + 1}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 left-0 right-0 bg-dark/70 text-white p-2 text-sm">
                            镜头 ${index + 1} | ${formatTime(frame.time)}
                        </div>
                        <button class="absolute top-2 right-2 bg-accent/80 hover:bg-accent text-white p-1 rounded-full transition-colors duration-300"
                                onclick="downloadFrame('${frame.data}', '关键帧_${index + 1}.jpg')">
                            <i class="fa fa-download"></i>
                        </button>
                    </div>
                `;
                framesContainer.appendChild(frameElement);
            });
            
            // 启用下载按钮
            document.getElementById('download-all').disabled = false;
        }

        // 下载单个帧
        window.downloadFrame = function(dataUrl, fileName) {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // 下载所有分镜头
        document.getElementById('download-all-shots').addEventListener('click', function() {
            if (shots.length === 0) return;
            
            // 创建一个ZIP文件并添加所有分镜头预览
            const zip = new JSZip();
            
            // 确保所有分镜头都被添加到ZIP文件中
            shots.forEach((shot, index) => {
                const base64Data = shot.thumbnail.split(',')[1];
                zip.file(`分镜头_${index + 1}_${formatTime(shot.start)}_${formatTime(shot.end)}.jpg`, base64Data, {base64: true});
            });
            
            // 生成并下载ZIP文件
            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `视频分镜头预览合集_${new Date().toISOString().slice(0,10)}.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        });

        // 下载所有帧
        document.getElementById('download-all').addEventListener('click', function() {
            if (keyFrames.length === 0) return;
            
            // 创建一个ZIP文件并添加所有关键帧
            const zip = new JSZip();
            
            // 确保所有帧都被添加到ZIP文件中
            keyFrames.forEach((frame, index) => {
                const base64Data = frame.data.split(',')[1];
                zip.file(`关键帧_${index + 1}.jpg`, base64Data, {base64: true});
            });
            
            // 生成并下载ZIP文件
            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `视频分镜头_关键帧合集_${new Date().toISOString().slice(0,10)}.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        });

        // 重置分析
        document.getElementById('reset-analysis').addEventListener('click', function() {
            videoElement.currentTime = 0;
            document.getElementById('shots-preview').classList.add('hidden');
            document.getElementById('frames-extracted').classList.add('hidden');
            document.getElementById('extract-frames').disabled = true;
            document.getElementById('download-all').disabled = true;
            document.getElementById('download-shots').disabled = true;
            document.getElementById('download-all-shots').disabled = true;
            shots = [];
            keyFrames = [];
        });

        // 场景变化检测阈值调整
        document.getElementById('scene-threshold').addEventListener('input', function() {
            document.getElementById('threshold-value').textContent = this.value;
        });

        // 格式化时间
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            const tenths = Math.floor((seconds * 10) % 10);
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${tenths}`;
        }
    </script>
    <!-- JSZip库用于打包下载多个文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
